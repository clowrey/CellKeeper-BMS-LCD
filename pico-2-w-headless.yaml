esphome:
  name: pico-2-w-headless
  friendly_name: Pico 2 W Headless BMS
  min_version: "2025.4.2"

rp2040:
  board: rpi-pico-w

# Modular Packages
packages:
  bms_core: !include bms_core.yaml
  bms_scripts: !include bms_headless_scripts.yaml

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  baud_rate: 115200
  level: DEBUG

uart:
  - id: uart_bus
    tx_pin: GPIO0
    rx_pin:
      number: GPIO1
      mode:
        input: true
        pullup: false
    baud_rate: 460800
    rx_buffer_size: 1024

sensor:
  - platform: uptime
    id: uptime_sec
    update_interval: 5s
