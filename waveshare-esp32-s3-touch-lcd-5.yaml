esphome:
  name: waveshare-esp32-s3-lcd
  friendly_name: Waveshare ESP32-S3 LCD 5
  min_version: 2025.10.0

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_IDF_EXPERIMENTAL_FEATURES: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_SPIRAM_USE_MALLOC: y
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_COMPILER_OPTIMIZATION_PERF: y
    advanced:
      loop_task_stack_size: 8704

# Modular Packages
packages:
  bms_core: !include bms_core.yaml
  bms_ui: !include bms_ui_scripts.yaml
  ui_layout: !include ui_800x480.yaml

psram:
  mode: octal
  speed: 80MHz

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "BMS-LCD-5-Hotspot"
  #use_address: 10.60.12.73

captive_portal:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - light.turn_off: display_backlight
        - lvgl.pause: {}

logger:
  baud_rate: 0 # Serial used for BMS
  level: DEBUG

uart:
  - id: uart_bus
    tx_pin: GPIO19
    rx_pin:
      number: GPIO20
      mode:
        input: true
        pullup: false
    baud_rate: 460800
    rx_buffer_size: 1024

i2c:
  - id: bus_a
    sda: GPIO08
    scl: GPIO09
    scan: true

ch422g:
  - id: ch422g_hub

output:
  - platform: gpio
    id: lcdbacklight_output
    pin:
      ch422g: ch422g_hub
      number: 2

light:
  - platform: binary
    output: lcdbacklight_output
    id: display_backlight # ID used in on_boot
    name: LCD Backlight
    restore_mode: ALWAYS_ON

touchscreen:
  - platform: gt911
    id: my_touchscreen
    interrupt_pin: 4
    reset_pin:
      ch422g: ch422g_hub
      number: 1

# RGB Display Configuration
display:
  - platform: rpi_dpi_rgb
    id: my_display
    color_order: RGB
    dimensions:
      width: 800
      height: 480
    data_pins:
      - GPIO14 # B3
      - GPIO38 # B4
      - GPIO18 # B5
      - GPIO17 # B6
      - GPIO10 # B7
      - GPIO39 # G2
      - GPIO0  # G3
      - GPIO45 # G4
      - GPIO48 # G5
      - GPIO47 # G6
      - GPIO21 # G7
      - GPIO1  # R3
      - GPIO2  # R4
      - GPIO42 # R5
      - GPIO41 # R6
      - GPIO40 # R7
    reset_pin:
      ch422g: ch422g_hub
      number: 3
    pclk_pin: 7
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    de_pin: GPIO5
    pclk_frequency: 14MHz
    hsync_pulse_width: 48
    hsync_back_porch: 40
    hsync_front_porch: 40
    vsync_pulse_width: 3
    vsync_back_porch: 29
    vsync_front_porch: 13

sensor:
  - platform: uptime
    id: uptime_sec
    update_interval: 5s
