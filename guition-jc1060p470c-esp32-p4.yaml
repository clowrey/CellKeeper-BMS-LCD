# Device entry point: device-specific name, secrets (connection), and packages.
# Secrets are in this file so they stay at top level; values come from secrets.yaml.

esphome:
  name: ck0 # no friendly name so ck0 is the entity prefix
  friendly_name: CK0
  min_version: 2025.11.0
  project:
    name: "CellKeeper.ESP32-P4-JC1060P470"
    version: "1.0b"
  on_boot:
    priority: -100
    then:
      - lvgl.resume: {}
      - light.turn_on:
          id: display_backlight
          brightness: 30%

packages:
  bms_core: !include bms_core.yaml
  bms_ui: !include bms_ui_scripts.yaml
  hardware: !include hardware_guition_jc1060p470-serial.yaml

web_server:
  port: 80
  auth:
    username: !secret web_server_username
    password: !secret web_server_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  reboot_timeout: 0s
  use_address: 172.16.2.222

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password
    on_begin:
      then:
        - light.turn_off: display_backlight
        - lvgl.pause: {}
  - platform: web_server

safe_mode:
  disabled: true
