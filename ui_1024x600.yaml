    - id: debug_commands_page
      on_swipe_left:
        - lvgl.page.show: balancing_page
      on_swipe_right:
        - lvgl.page.show: debug_page_3
      widgets:
        - label:
            text: "BMS SYSTEM COMMANDS"
            align: TOP_MID
            y: 20
            text_font: font_roboto_40
            text_color: 0xAAAAAA

        - button:
            id: btn_stop
            x: 0
            y: 100
            width: 300
            height: 80
            align: TOP_MID
            widgets:
              - label:
                  text: "STOP (Transition to Inactive)"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(2);

        - button:
            id: btn_run
            x: 0
            y: 200
            width: 300
            height: 80
            align: TOP_MID
            widgets:
              - label:
                  text: "RUN (Transition to Operating)"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(1);

        - button:
            id: btn_calibrate
            x: 0
            y: 300
            width: 300
            height: 80
            align: TOP_MID
            widgets:
              - label:
                  text: "CALIBRATE"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(3);

        - label:
            text: "← Swipe left for Data | Swipe right for Log →"
            align: BOTTOM_MID
            y: -20
            text_font: font_roboto_20
            text_color: 0x666666

