      on_swipe_right:
        - lvgl.page.show: debug_page_3
      widgets:
        - label:
            text: "SYSTEM COMMANDS"
            align: TOP_MID
            y: 20
            text_font: font_roboto_40
            text_color: 0xAAAAAA

        - button:
            id: btn_stop
            x: 0
            y: 80
            width: 300
            height: 70
            align: TOP_MID
            widgets:
              - label:
                  text: "STOP"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(2);

        - button:
            id: btn_run
            x: 0
            y: 160
            width: 300
            height: 70
            align: TOP_MID
            widgets:
              - label:
                  text: "RUN"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(1);

        - button:
            id: btn_calibrate
            x: 0
            y: 240
            width: 300
            height: 70
            align: TOP_MID
            widgets:
              - label:
                  text: "CALIBRATE"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    id(bms_hub).send_system_request(3);

