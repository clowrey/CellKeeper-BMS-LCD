substitutions:
  cell_width: "7"
  cell_gap: "5"

font:
  - file: "gfonts://Roboto"
    id: font_roboto_20
    size: 20
  - file: "gfonts://Roboto"
    id: font_roboto_40
    size: 40
  - file: "gfonts://Roboto"
    id: font_roboto_80
    size: 80
  - file: "gfonts://Roboto Mono"
    id: font_roboto_mono_14
    size: 14

lvgl:
  id: my_lvgl
  displays: my_display
  touchscreens: my_touchscreen
  bg_color: 0x000000
  disp_bg_color: 0x000000
  buffer_size: 20%
  byte_order: little_endian
  pages:
    - id: main_page
      on_swipe_left:
        - lvgl.page.show: details_page
      on_swipe_right:
        - lvgl.page.show: debug_page
      widgets:
        - label:
            id: label_events
            text: ""
            align: TOP_MID
            y: 0
            width: 100%
            text_font: font_roboto_20
            text_color: 0xFFFFFF
            bg_opa: 100%
            bg_color: 0x000000

        - label:
            id: label_contactor
            text: "Contactor: 0 OPEN / OFF"
            align: TOP_MID
            y: 320 # Moved up from 400
            text_font: font_roboto_40
            text_color: 0xFFFFFF

        # SOC Arc Indicator
        - arc:
            id: soc_arc
            width: 280 # Scaled down from 340
            height: 280
            align: TOP_LEFT
            x: 20
            y: 40
            min_value: 0
            max_value: 100
            bg_color: 0x1A1A1A
            widgets:
              - label:
                  id: label_soc
                  text: " "
                  align: CENTER
                  text_font: font_roboto_80
                  text_color: 0xFFFFFF
              - label:
                  text: "SOC"
                  align: CENTER
                  y: 50
                  text_font: font_roboto_20
                  text_color: 0xAAAAAA

        # Main Data (Right Side)
        - label:
            id: label_voltage
            text: "--V"
            align: TOP_RIGHT
            x: -80
            y: 40
            text_font: font_roboto_80
            text_color: 0x00BFFF

        - label:
            id: label_current
            text: "--A"
            align: TOP_RIGHT
            x: -80
            y: 130
            text_font: font_roboto_80
            text_color: 0xFFA500

        - label:
            id: label_power
            text: "--kW"
            align: TOP_RIGHT
            x: -80
            y: 220
            text_font: font_roboto_80
            text_color: 0xADFF2F

        # Divider
        - obj:
            width: 95%
            height: 2
            align: BOTTOM_MID
            y: -110
            bg_color: 0x333333

        # Statistics Grid (Bottom)
        - label:
            text: "TEMP MIN/MAX (DELTA)"
            align: BOTTOM_LEFT
            x: 40
            y: -75
            text_font: font_roboto_20
            text_color: 0x888888
        - label:
            id: label_temp
            text: " "
            align: BOTTOM_LEFT
            x: 40
            y: -30
            text_font: font_roboto_40
            text_color: 0xFFFFFF

        - label:
            text: "CELL MIN/MAX (DELTA)"
            align: BOTTOM_RIGHT
            x: -40
            y: -75
            text_font: font_roboto_20
            text_color: 0x888888
        - label:
            id: label_cells
            text: " "
            align: BOTTOM_RIGHT
            x: -80
            y: -30
            text_font: font_roboto_40
            text_color: 0xFFFFFF

        # Uptime
        - label:
            id: label_uptime
            text: "HMI/BMS: -- / --"
            align: BOTTOM_MID
            y: -5
            text_font: font_roboto_20
            text_color: 0x444444

    - id: details_page
      on_swipe_right:
        - lvgl.page.show: main_page
      widgets:
        - label:
            text: "CELL VOLTAGES"
            align: TOP_MID
            y: 10
            text_font: font_roboto_40
            text_color: 0xAAAAAA

        - line:
            id: cell_line_chart
            width: 756 # 108 * 7
            height: 350
            align: CENTER
            y: 10
            line_width: 2
            line_color: 0x00FF00
            points:
              - 0, 350
              - 756, 350

        - label:
            text: "← Swipe right to return"
            align: BOTTOM_MID
            y: -10
            text_font: font_roboto_20
            text_color: 0x666666

    - id: debug_page
      on_swipe_left:
        - lvgl.page.show: main_page
      on_swipe_right:
