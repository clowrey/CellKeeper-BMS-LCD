    - id: wifi_page
      on_swipe_left:
        - lvgl.page.show: bms_log_page
      widgets:
        - label:
            text: "WIFI SETTINGS"
            align: TOP_MID
            y: 20
            text_font: font_roboto_40
            text_color: 0xAAAAAA

        - label:
            id: label_wifi_ssid
            text: "SSID: --"
            align: TOP_LEFT
            x: 40
            y: 80
            text_font: font_roboto_20
            text_color: 0xFFFFFF

        - label:
            id: label_wifi_ip
            text: "IP: --"
            align: TOP_LEFT
            x: 40
            y: 110
            text_font: font_roboto_20
            text_color: 0xFFFFFF

        - label:
            id: label_wifi_rssi
            text: "Signal: -- dBm"
            align: TOP_LEFT
            x: 40
            y: 140
            text_font: font_roboto_20
            text_color: 0xFFFFFF

        - button:
            id: btn_wifi_reset
            x: 0
            y: 200
            width: 350
            height: 70
            align: TOP_MID
            widgets:
              - label:
                  text: "RESET WIFI (PORTAL)"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    wifi::global_wifi_component->clear_sta();
                    App.reboot();

        - button:
            id: btn_reboot
            x: 0
            y: 280
            width: 350
            height: 70
            align: TOP_MID
            widgets:
              - label:
                  text: "REBOOT DEVICE"
                  align: CENTER
            on_click:
              then:
                - lambda: |-
                    App.reboot();

        - label:
            text: "← Swipe left for BMS Log"
            align: BOTTOM_MID
            y: -10
            text_font: font_roboto_20
            text_color: 0x666666
