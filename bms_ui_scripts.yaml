interval:
  - interval: 250ms
    then:
      - lambda: |-
          // --- MAIN PAGE UPDATES ---
          float soc = id(bms_soc).state;
          if (!std::isnan(soc)) {
            lv_label_set_text(id(label_soc), str_sprintf("%.0f%%", soc).c_str());
            lv_arc_set_value(id(soc_arc), (int)soc);
          }

          float v = id(bms_voltage_mV).state;
          float i = id(bms_current_mA).state;
          if (!std::isnan(v)) lv_label_set_text(id(label_voltage), str_sprintf("%.1fV", v).c_str());
          if (!std::isnan(i)) lv_label_set_text(id(label_current), str_sprintf("%.2fA", i).c_str());
          
          if (!std::isnan(v) && !std::isnan(i)) {
            float p = v * i;
            if (std::abs(p) >= 1000.0f) lv_label_set_text(id(label_power), str_sprintf("%.2fkW", p / 1000.0f).c_str());
            else lv_label_set_text(id(label_power), str_sprintf("%.0fW", p).c_str());
          }

          float t_min = id(bms_temp_min).state;
          float t_max = id(bms_temp_max).state;
          if (!std::isnan(t_min) && !std::isnan(t_max)) {
            lv_label_set_text(id(label_temp), str_sprintf("%.1f / %.1f (%.1f)", t_min, t_max, t_max - t_min).c_str());
          }

          float c_min = id(bms_cell_min).state;
          float c_max = id(bms_cell_max).state;
          if (!std::isnan(c_min) && !std::isnan(c_max)) {
            lv_label_set_text(id(label_cells), str_sprintf("%.3f / %.3f (%.3f)", c_min, c_max, c_max - c_min).c_str());
          }

          if (id(bms_contactor_state_text).has_state())
            lv_label_set_text(id(label_contactor), ("Contactor: " + id(bms_contactor_state_text).state).c_str());
          
          if (id(bms_last_event_text).has_state())
            lv_label_set_text(id(label_events), id(bms_last_event_text).state.c_str());

          lv_label_set_text(id(label_uptime), str_sprintf("Uptime: %.0fs", id(uptime_sec).state).c_str());

          // --- DEBUG PAGE UPDATES ---
          if (lv_scr_act() == id(debug_page)->obj) {
            lv_label_set_text(id(label_debug_millis), str_sprintf("Reg 2: %.0f ms", id(bms_millis).state).c_str());
            lv_label_set_text(id(debug_reg_3), str_sprintf("Reg 3: %.1f %%", id(bms_soc).state).c_str());
            lv_label_set_text(id(debug_reg_4), str_sprintf("Reg 4: %.3f A", id(bms_current_mA).state).c_str());
            lv_label_set_text(id(debug_reg_5), str_sprintf("Reg 5: %.2f Ah", id(bms_capacity_mC).state).c_str());
            lv_label_set_text(id(debug_reg_6), str_sprintf("Reg 6: %.3f V", id(bms_voltage_mV).state).c_str());
            lv_label_set_text(id(debug_reg_10), str_sprintf("Reg 10: %.1f C", id(bms_temp_min).state).c_str());
            lv_label_set_text(id(debug_reg_11), str_sprintf("Reg 11: %.1f C", id(bms_temp_max).state).c_str());
            lv_label_set_text(id(debug_reg_12), str_sprintf("Reg 12: %.3f V", id(bms_cell_min).state).c_str());
            lv_label_set_text(id(debug_reg_13), str_sprintf("Reg 13: %.3f V", id(bms_cell_max).state).c_str());
            lv_label_set_text(id(debug_reg_15), str_sprintf("Reg 15: %s", id(bms_system_state_text).state.c_str()).c_str());
            lv_label_set_text(id(debug_reg_16), str_sprintf("Reg 16: %s", id(bms_contactor_state_text).state.c_str()).c_str());
            lv_label_set_text(id(debug_reg_37), str_sprintf("Reg 37 (ADC): %.0f", id(bms_adc_samples).state).c_str());
            lv_label_set_text(id(debug_reg_38), str_sprintf("Reg 38 (Freq): %.0f Hz", id(bms_loop_freq).state).c_str());
          }

          // --- EVENT LOG PAGE UPDATES ---
          if (lv_scr_act() == id(debug_page_3)->obj) {
            auto* bms = (esphome::hmi_bms::HMIBMS*) id(bms_hub);
            auto* history_sensor = bms->get_event_history_text_sensor();
            if (history_sensor && !history_sensor->state.empty()) {
               lv_label_set_text(id(label_debug_event_log), history_sensor->state.c_str());
            } else {
               lv_label_set_text(id(label_debug_event_log), "No events logged.");
            }
          }

          // --- BALANCING PAGE UPDATES ---
          if (lv_scr_act() == id(balancing_page)->obj) {
            static bool initialized = false;
            if (!initialized) {
               // Voltage Spinboxes (31, 32, 35, 36): Range 0-5000 (0-5V), Format 4.3
               lv_spinbox_set_range(id(sb_reg_31), 0, 5000);
               lv_spinbox_set_digit_format(id(sb_reg_31), 4, 3);
               lv_spinbox_step_prev(id(sb_reg_31));

               lv_spinbox_set_range(id(sb_reg_32), 0, 5000);
               lv_spinbox_set_digit_format(id(sb_reg_32), 4, 3);
               lv_spinbox_step_prev(id(sb_reg_32));

               lv_spinbox_set_range(id(sb_reg_35), 0, 1000);
               lv_spinbox_set_digit_format(id(sb_reg_35), 4, 3);
               lv_spinbox_step_prev(id(sb_reg_35));

               lv_spinbox_set_range(id(sb_reg_36), 0, 5000);
               lv_spinbox_set_digit_format(id(sb_reg_36), 4, 3);
               lv_spinbox_step_prev(id(sb_reg_36));

               // Auto Period (33): Range 0-3600000, Format 7.0
               lv_spinbox_set_range(id(sb_reg_33), 0, 3600000);
               lv_spinbox_set_digit_format(id(sb_reg_33), 7, 0);
               lv_spinbox_step_prev(id(sb_reg_33));

               // Period/mV (34): Range 0-1000, Format 4.0
               lv_spinbox_set_range(id(sb_reg_34), 0, 1000);
               lv_spinbox_set_digit_format(id(sb_reg_34), 4, 0);
               lv_spinbox_step_prev(id(sb_reg_34));

               // Max Charge/Discharge (39, 40): Range 0-500000 (500A), Format 6.3 (XXX.XXX)
               lv_spinbox_set_range(id(sb_reg_39), 0, 500000);
               lv_spinbox_set_digit_format(id(sb_reg_39), 6, 3);
               lv_spinbox_step_prev(id(sb_reg_39));

               lv_spinbox_set_range(id(sb_reg_40), 0, 500000);
               lv_spinbox_set_digit_format(id(sb_reg_40), 6, 3);
               lv_spinbox_step_prev(id(sb_reg_40));

               initialized = true;
            }

            // Update spinboxes if the value differs (checking as integer to avoid float precision jitter)
            int32_t soft_min = (int32_t)(id(bms_cv_soft_min).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_31)) != soft_min) lv_spinbox_set_value(id(sb_reg_31), soft_min);

            int32_t soft_max = (int32_t)(id(bms_cv_soft_max).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_32)) != soft_max) lv_spinbox_set_value(id(sb_reg_32), soft_max);

            int32_t min_offset = (int32_t)(id(bms_bal_min_offset).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_35)) != min_offset) lv_spinbox_set_value(id(sb_reg_35), min_offset);

            int32_t min_bal_v = (int32_t)(id(bms_min_bal_v).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_36)) != min_bal_v) lv_spinbox_set_value(id(sb_reg_36), min_bal_v);

            int32_t auto_period = (int32_t)(id(bms_auto_bal_period).state);
            if (lv_spinbox_get_value(id(sb_reg_33)) != auto_period) lv_spinbox_set_value(id(sb_reg_33), auto_period);

            int32_t per_mv = (int32_t)(id(bms_bal_periods_mv).state);
            if (lv_spinbox_get_value(id(sb_reg_34)) != per_mv) lv_spinbox_set_value(id(sb_reg_34), per_mv);

            int32_t max_chg = (int32_t)(id(bms_max_charge).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_39)) != max_chg) lv_spinbox_set_value(id(sb_reg_39), max_chg);

            int32_t max_dis = (int32_t)(id(bms_max_discharge).state * 1000.0f);
            if (lv_spinbox_get_value(id(sb_reg_40)) != max_dis) lv_spinbox_set_value(id(sb_reg_40), max_dis);

            lv_label_set_text(id(label_balancing_cells), id(bms_balancing_cells).state.c_str());
          }

          // --- BMS LOG PAGE UPDATES ---
          if (lv_scr_act() == id(bms_log_page)->obj) {
            bool log_on = id(bms_log_enable).state;
            lv_label_set_text(id(label_log_enable_status), log_on ? "Log: ON" : "Log: OFF");
            lv_label_set_text(id(label_log_toggle_btn), log_on ? "ON" : "OFF");
            float rate = id(bms_log_update_rate).state;
            if (!std::isnan(rate)) {
              lv_label_set_text(id(label_log_rate), str_sprintf("Rate: %.0fs", rate).c_str());
            }
            static text_sensor::TextSensor* log_sensors[] = {
              id(bms_log_line_01), id(bms_log_line_02), id(bms_log_line_03), id(bms_log_line_04),
              id(bms_log_line_05), id(bms_log_line_06), id(bms_log_line_07), id(bms_log_line_08),
              id(bms_log_line_09), id(bms_log_line_10), id(bms_log_line_11), id(bms_log_line_12),
              id(bms_log_line_13), id(bms_log_line_14), id(bms_log_line_15), id(bms_log_line_16),
              id(bms_log_line_17), id(bms_log_line_18), id(bms_log_line_19), id(bms_log_line_20),
              id(bms_log_line_21), id(bms_log_line_22), id(bms_log_line_23), id(bms_log_line_24),
              id(bms_log_line_25), id(bms_log_line_26), id(bms_log_line_27), id(bms_log_line_28),
              id(bms_log_line_29), id(bms_log_line_30), id(bms_log_line_31), id(bms_log_line_32),
              id(bms_log_line_33), id(bms_log_line_34), id(bms_log_line_35), id(bms_log_line_36),
              id(bms_log_line_37), id(bms_log_line_38), id(bms_log_line_39), id(bms_log_line_40),
              id(bms_log_line_41), id(bms_log_line_42), id(bms_log_line_43), id(bms_log_line_44),
              id(bms_log_line_45), id(bms_log_line_46), id(bms_log_line_47), id(bms_log_line_48),
              id(bms_log_line_49), id(bms_log_line_50)
            };
            static lv_obj_t* log_labels[] = {
              id(label_bms_log_01), id(label_bms_log_02), id(label_bms_log_03), id(label_bms_log_04),
              id(label_bms_log_05), id(label_bms_log_06), id(label_bms_log_07), id(label_bms_log_08),
              id(label_bms_log_09), id(label_bms_log_10), id(label_bms_log_11), id(label_bms_log_12),
              id(label_bms_log_13), id(label_bms_log_14), id(label_bms_log_15), id(label_bms_log_16),
              id(label_bms_log_17), id(label_bms_log_18), id(label_bms_log_19), id(label_bms_log_20),
              id(label_bms_log_21), id(label_bms_log_22), id(label_bms_log_23), id(label_bms_log_24),
              id(label_bms_log_25), id(label_bms_log_26), id(label_bms_log_27), id(label_bms_log_28),
              id(label_bms_log_29), id(label_bms_log_30), id(label_bms_log_31), id(label_bms_log_32),
              id(label_bms_log_33), id(label_bms_log_34), id(label_bms_log_35), id(label_bms_log_36),
              id(label_bms_log_37), id(label_bms_log_38), id(label_bms_log_39), id(label_bms_log_40),
              id(label_bms_log_41), id(label_bms_log_42), id(label_bms_log_43), id(label_bms_log_44),
              id(label_bms_log_45), id(label_bms_log_46), id(label_bms_log_47), id(label_bms_log_48),
              id(label_bms_log_49), id(label_bms_log_50)
            };
            for (int i = 0; i < 50; i++) {
              if (log_sensors[i]->has_state()) {
                lv_label_set_text(log_labels[i], log_sensors[i]->state.c_str());
              }
            }
          }

          // --- WIFI PAGE UPDATES ---
          if (lv_scr_act() == id(wifi_page)->obj) {
            lv_label_set_text(id(label_wifi_ip), ("IP: " + id(wifi_ip_sensor).state).c_str());
            lv_label_set_text(id(label_wifi_ssid), ("SSID: " + id(wifi_ssid_sensor).state).c_str());
            lv_label_set_text(id(label_wifi_rssi), str_sprintf("Signal: %.0f dBm", id(wifi_rssi_sensor).state).c_str());
          }

          // --- CELL VOLTAGES PAGE ---
          if (lv_scr_act() == id(details_page)->obj) {
            static lv_point_t points[108 * 2];
            auto sensors = id(bms_hub).get_cell_voltage_sensors();
            for(int i=0; i<108 && i<sensors.size(); i++) {
              int x = i * 7;
              float val = sensors[i]->state;
              int16_t y = std::isnan(val) ? 350 : (int16_t)(350 - (val - 2.5f) / 1.7f * 350.0f);
              points[i*2] = {(lv_coord_t)x, 350};
              points[i*2+1] = {(lv_coord_t)x, (lv_coord_t)std::clamp((int)y, 0, 350)};
            }
            lv_line_set_points(id(cell_line_chart)->obj, points, 108 * 2);
          }
