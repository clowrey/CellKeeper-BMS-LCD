title: BMS Dashboard
views:
  - title: Overview
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Overview
          - type: custom:auto-entities
            card:
              type: grid
              title: Active Events
              columns: 2
              square: false
            card_param: cards
            filter:
              template: >
                {% for state in states.sensor | selectattr('entity_id',
                'search', 'ck0_(fatal|critical|warning|info)_') |
                sort(attribute='attributes.friendly_name') -%}
                  {% if state.state not in ['INACTIVE', 'unknown', 'unavailable'] and not state.state.startswith('INACTIVE') -%}
                    {% set color = '#2196F3' -%}
                    {% set level = 'Info' -%}
                    {% if 'FATAL' in state.state %}{% set color = '#D50000' -%}{% set level = 'Fatal' -%}
                    {% elif 'CRITICAL' in state.state %}{% set color = '#F44336' -%}{% set level = 'Critical' -%}
                    {% elif 'WARNING' in state.state %}{% set color = '#FFC107' -%}{% set level = 'Warning' -%}
                    {% elif 'INFO' in state.state %}{% set color = '#2196F3' -%}{% set level = 'Info' -%}
                    {% elif 'fatal' in state.entity_id %}{% set color = '#D50000' -%}{% set level = 'Fatal' -%}
                    {% elif 'critical' in state.entity_id %}{% set color = '#F44336' -%}{% set level = 'Critical' -%}
                    {% elif 'warning' in state.entity_id %}{% set color = '#FFC107' -%}{% set level = 'Warning' -%}
                    {% elif 'info' in state.entity_id %}{% set color = '#2196F3' -%}{% set level = 'Info' -%}
                    {% endif -%}
                    {{
                      {
                        "type": "tile",
                        "entity": state.entity_id,
                        "name": (state.attributes.friendly_name | replace("CellKeeper0", "") | replace("ck0", "") | replace("Fatal:", "") | replace("Critical:", "") | replace("Warning:", "") | replace("Info:", "") | trim),
                        "color": color,
                        "card_mod": {
                          "style": "ha-card { --tile-color: " + color + " !important; }"
                        }
                      }
                    }},
                  {%- endif %}
                {%- endfor %}
            show_empty: false
            unique: true
          - type: custom:mushroom-title-card
            title: BMS Status
            subtitle: Battery Management System Overview
          - type: grid
            columns: 2
            square: false
            cards:
              - type: gauge
                entity: sensor.ck0_bms_soc
                name: SOC
                unit: '%'
                min: 0
                max: 100
                needle: true
                severity:
                  green: 30
                  yellow: 10
                  red: 0
              - type: gauge
                entity: sensor.ck0_pack_voltage
                name: Pack Voltage
                min: 288
                max: 410
                needle: true
                segments:
                  - from: 288
                    color: '#db4437'
                  - from: 300
                    color: '#ffa600'
                  - from: 330
                    color: '#43a047'
                  - from: 400
                    color: '#db4437'
              - type: gauge
                entity: sensor.ck0_bms_cell_min
                name: Cell Min
                min: 2.95
                max: 4.25
                needle: true
                segments:
                  - from: 2.95
                    color: '#db4437'
                  - from: 3
                    color: '#ffa600'
                  - from: 3.3
                    color: '#43a047'
                  - from: 4.15
                    color: '#ffa600'
                  - from: 4.2
                    color: '#db4437'
              - type: gauge
                entity: sensor.ck0_bms_cell_max
                name: Cell Max
                min: 2.95
                max: 4.25
                needle: true
                segments:
                  - from: 2.95
                    color: '#db4437'
                  - from: 3
                    color: '#ffa600'
                  - from: 3.3
                    color: '#43a047'
                  - from: 4.15
                    color: '#ffa600'
                  - from: 4.2
                    color: '#db4437'
              - type: gauge
                entity: sensor.ck0_bms_current
                name: Current
                min: -200
                max: 200
                needle: true
                severity:
                  green: 0
                  red: -200
              - type: gauge
                entity: sensor.ck0_bms_power_w
                name: Power
                unit: W
                min: -10000
                max: 10000
                needle: true
                severity:
                  green: 0
                  red: -10000
          - type: entities
            title: System Status
            entities:
              - entity: sensor.ck0_bms_system_state_text
                name: System State
              - entity: sensor.ck0_bms_contactor_state_text
                name: Contactor State
              - entity: button.ck0_bms_run
                name: Run BMS
                icon: mdi:play
              - entity: button.ck0_bms_stop
                name: Stop BMS
                icon: mdi:stop
              - entity: button.ck0_bms_calibrate
                name: Offline Calibration (Inverter Disconnected, Contactors Open)
                icon: mdi:wrench
  - title: Detail
    type: sections
    max_columns: 3
    sections:
      - cards:
          - type: heading
            heading: Battery Details
          - type: entities
            title: Voltage & Capacity
            entities:
              - entity: sensor.ck0_pack_voltage
                name: Pack Voltage
              - entity: sensor.ck0_bms_output_voltage
                name: Output Voltage
              - entity: sensor.ck0_pack_voltage_bmb
                name: Pack Voltage BMB
              - entity: sensor.ck0_bms_contactor_voltage_positive
                name: Positive Contactor
              - entity: sensor.ck0_bms_contactor_voltage_negative
                name: Negative Contactor
              - entity: sensor.ck0_bms_capacity
                name: Capacity
              - entity: sensor.ck0_bms_charge_raw
                name: Charge Raw
              - entity: sensor.ck0_bms_soc
                name: SOC (EKF Based)
              - entity: sensor.ck0_bms_soc_voltage_based
                name: SOC (Voltage Based)
              - entity: sensor.ck0_bms_soc_basic_count
                name: SOC (Basic Count)
          - type: entities
            title: Inverter CAN Values
            entities:
              - entity: sensor.ck0_inverter_can_soc
                name: Inverter CAN SOC
              - entity: sensor.ck0_inverter_can_full_capacity
                name: Inverter CAN Full Capacity
              - entity: sensor.ck0_inverter_can_remaining_capacity
                name: Inverter CAN Remaining Capacity
              - entity: sensor.ck0_inverter_can_min_voltage_limit
                name: Inverter CAN Min Voltage
              - entity: sensor.ck0_inverter_can_max_voltage_limit
                name: Inverter CAN Max Voltage
          - type: entities
            title: Energy Stats
            entities:
              - entity: sensor.ck0_bms_power_charging
                name: Power Charging
              - entity: sensor.ck0_bms_power_discharging
                name: Power Discharging
              - entity: sensor.ck0_bms_energy_charged_daily
                name: Energy Charged (Daily)
              - entity: sensor.ck0_bms_energy_discharged_daily
                name: Energy Discharged (Daily)
              - entity: sensor.ck0_bms_net_energy_daily
                name: Net Energy (Daily)
      - cards:
          - type: heading
            heading: Temperature
          - type: grid
            columns: 2
            cards:
              - type: entity
                entity: sensor.ck0_bms_temp_min
                name: Min Temp
              - type: entity
                entity: sensor.ck0_bms_temp_max
                name: Max Temp
          - type: entities
            title: Module Temperatures
            entities:
              - entity: sensor.ck0_bms_module_temp_1
              - entity: sensor.ck0_bms_module_temp_2
              - entity: sensor.ck0_bms_module_temp_3
              - entity: sensor.ck0_bms_module_temp_4
              - entity: sensor.ck0_bms_module_temp_5
              - entity: sensor.ck0_bms_module_temp_6
              - entity: sensor.ck0_bms_module_temp_7
              - entity: sensor.ck0_bms_module_temp_8
  - title: Cells
    type: sections
    max_columns: 4
    sections:
      - type: grid
        column_span: 4
        cards:
          - type: entities
            grid_options:
              columns: 12
              rows: auto
            title: Cell Summary
            entities:
              - entity: sensor.ck0_bms_cell_min
                name: Min Cell Voltage
              - entity: sensor.ck0_bms_cell_max
                name: Max Cell Voltage
              - entity: sensor.ck0_bms_cell_delta
                name: Cell Delta
              - entity: sensor.ck0_bms_balancing_cells
                name: Balancing Cells
          - type: custom:plotly-graph
            grid_options:
              columns: full
              rows: 10
            title: Cell Voltages
            raw_plotly_config: true
            refresh_interval: 2
            fn: |-
              $ex {
                vars.x = [];
                vars.y = [];
                vars.colors = [];
                
                let balancing_str = hass.states['sensor.ck0_bms_balancing_cells'] ? hass.states['sensor.ck0_bms_balancing_cells'].state : "";
                let balancing_cells = [];
                if (balancing_str && balancing_str !== "None" && balancing_str !== "unknown" && balancing_str !== "unavailable") {
                   balancing_cells = balancing_str.split(',').map(s => parseInt(s.trim()));
                }
                
                for (let j = 0; j < 108; j++) {
                  let index = j + 1;
                  let suffix = index.toString().padStart(3, '0');
                  let entity_id = "sensor.ck0_cell_voltage_" + suffix;
                  
                  if (hass.states[entity_id]) {
                    let val = parseFloat(hass.states[entity_id].state);
                    // Only include valid values > 0 to avoid skewing the graph
                    if (!isNaN(val) && val > 0.01) {
                      vars.x.push(index);
                      vars.y.push(val);
                      
                      if (balancing_cells.includes(index)) {
                        vars.colors.push("#FF9800"); // Balancing color (Orange)
                      } else {
                        vars.colors.push("#3498db"); // Normal color (Blue)
                      }
                    }
                  }
                }

                if (vars.y.length > 0) {
                  vars.ymin = Math.min(...vars.y) - 0.01;
                  vars.ymax = Math.max(...vars.y) + 0.01;
                } else {
                  vars.ymin = 0;
                  vars.ymax = 5;
                }
              }
            entities:
              - entity: ''
                type: bar
                x: $ex vars.x
                'y': $ex vars.y
                texttemplate: '%{y:.3f}'
                marker:
                  color: $ex vars.colors
            layout:
              autosize: true
              height: 600
              xaxis:
                title: Cell Number
                type: category
              yaxis:
                title: Voltage (V)
                range:
                  - $ex vars.ymin
                  - $ex vars.ymax
            config:
              responsive: true
              displayModeBar: false
              scrollZoom: false
  - title: Configuration
    type: sections
    max_columns: 4
    sections:
      - cards:
          - type: heading
            heading: Configuration Guide
          - type: markdown
            content: >
              ## BMS Configuration

              Use **Settings Unlock Mode** to allow writes. When locked, values
              are read-only and write attempts are blocked.


              ### Voltage Protection Tiers

              - **Working Limits**: Defines the 0% to 100% SoC range used for
              normal operation.

              - **Soft Limits**: Triggers warning behavior and current limiting
              if exceeded.

              - **Hard Limits**: Firmware safety limits that force immediate
              disconnect.


              **Tip:** Set Working Min to your inverter's 0% SoC voltage point.
      - cards:
          - type: heading
            heading: Access & Write Status
          - type: grid
            columns: 1
            square: false
            cards:
              - type: entities
                title: Settings Unlock
                show_header_toggle: false
                entities:
                  - entity: switch.ck0_bms_settings_unlock
                    name: Settings Unlock
              - type: tile
                entity: sensor.ck0_bms_settings_status
                name: Settings Status
                card_mod:
                  style: |
                    ha-card {
                      {% set state = states(config.entity) %}
                      {% set state_l = state | lower %}
                      {% if 'settings applied' in state_l %}
                        --tile-color: #4CAF50 !important;
                        --primary-text-color: #4CAF50 !important;
                        --secondary-text-color: #4CAF50 !important;
                      {% elif 'auto-locked' in state_l %}
                        --tile-color: #D50000 !important;
                        --primary-text-color: #D50000 !important;
                        --secondary-text-color: #D50000 !important;
                      {% elif 'locked (unlock to apply)' in state_l %}
                        --tile-color: #D50000 !important;
                        --primary-text-color: #D50000 !important;
                        --secondary-text-color: #D50000 !important;
                      {% elif 'settings unlocked' in state_l %}
                        --tile-color: #2196F3 !important;
                        --primary-text-color: #2196F3 !important;
                        --secondary-text-color: #2196F3 !important;
                      {% elif 'settings locked' in state_l %}
                        --tile-color: #9E9E9E !important;
                        --primary-text-color: #9E9E9E !important;
                        --secondary-text-color: #9E9E9E !important;
                      {% endif %}
                    }
      - cards:
          - type: heading
            heading: SOC and Current
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: number.ck0_bms_soc_set_cmd
                name: SOC Set Cmd
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_soc_scaling_min
                name: SOC Scale Min
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_soc_scaling_max
                name: SOC Scale Max
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_max_charge_current
                name: Max Chg Curr
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_max_discharge_current
                name: Max Dchg Curr
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
      - cards:
          - type: heading
            heading: Voltage Limits
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: number.ck0_bms_voltage_limit_offset_lower
                name: VLimit Offs Low
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_voltage_limit_offset_upper
                name: VLimit Offs High
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_cell_voltage_working_min
                name: CellV Work Min
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_cell_voltage_working_max
                name: CellV Work Max
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_cell_voltage_soft_min
                name: CellV Soft Min
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_cell_voltage_soft_max
                name: CellV Soft Max
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
      - cards:
          - type: heading
            heading: Balancing
          - type: markdown
            content: |
              **Note:** `Auto Bal Period` is in milliseconds.
              - `0` = balancing disabled
              - `30000` = 30 second balancing period
          - type: grid
            columns: 2
            square: false
            cards:
              - type: tile
                entity: number.ck0_bms_auto_balancing_period
                name: Auto Bal Period
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_balancing_periods_per_mv
                name: Bal Periods/mV
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_balance_min_offset
                name: Bal Min Offset
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
              - type: tile
                entity: number.ck0_bms_minimum_balancing_voltage
                name: Min Bal V
                features_position: bottom
                features:
                  - type: numeric-input
                    style: buttons
