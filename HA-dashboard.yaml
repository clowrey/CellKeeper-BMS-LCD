title: BMS Dashboard
views:
  - title: Overview
    cards:
      - type: vertical-stack
        cards:
          - type: custom:auto-entities
            card:
              type: grid
              title: Active Events
              columns: 2
              square: false
            card_param: cards
            filter:
              template: |
                {% for state in states.sensor | selectattr('entity_id', 'search', 'ck0_(fatal|critical|warning|info)_') | sort(attribute='attributes.friendly_name') -%}
                  {% if state.state not in ['INACTIVE', 'unknown', 'unavailable'] and not state.state.startswith('INACTIVE') -%}
                    {% set color = '#FFC107' -%}
                    {% if 'FATAL' in state.state %}{% set color = '#D32F2F' -%}
                    {% elif 'CRITICAL' in state.state %}{% set color = '#F44336' -%}
                    {% elif 'WARNING' in state.state %}{% set color = '#FFC107' -%}
                    {% elif 'INFO' in state.state %}{% set color = '#2196F3' -%}
                    {% endif -%}
                    {{
                      {
                        "type": "tile",
                        "entity": state.entity_id,
                        "name": state.attributes.friendly_name | replace("CellKeeper0", "") | replace("ck0", "") | replace("Fatal:", "") | replace("Critical:", "") | replace("Warning:", "") | replace("Info:", "") | trim,
                        "card_mod": {
                          "style": "ha-card { --tile-color: " + color + " !important; }"
                        }
                      }
                    }},
                  {%- endif %}
                {%- endfor %}
            show_empty: false
            unique: true

          - type: custom:mushroom-title-card
            title: BMS Status
            subtitle: Battery Management System Overview

          - type: grid
            columns: 2
            square: false
            cards:
              - type: gauge
                entity: sensor.ck0_bms_soc
                name: SOC
                unit: "%"
                min: 0
                max: 100
                needle: true
                severity:
                  green: 30
                  yellow: 10
                  red: 0
              - type: gauge
                entity: sensor.ck0_bms_voltage
                name: Voltage
                min: 288
                max: 410
                needle: true
                segments:
                  - from: 288
                    color: "#db4437"
                  - from: 300
                    color: "#ffa600"
                  - from: 330
                    color: "#43a047"
                  - from: 400
                    color: "#db4437"
              - type: gauge
                entity: sensor.ck0_bms_cell_min
                name: Cell Min
                min: 2.95
                max: 4.25
                needle: true
                segments:
                  - from: 2.95
                    color: "#db4437"
                  - from: 3.0
                    color: "#ffa600"
                  - from: 3.3
                    color: "#43a047"
                  - from: 4.15
                    color: "#ffa600"
                  - from: 4.2
                    color: "#db4437"
              - type: gauge
                entity: sensor.ck0_bms_cell_max
                name: Cell Max
                min: 2.95
                max: 4.25
                needle: true
                segments:
                  - from: 2.95
                    color: "#db4437"
                  - from: 3.0
                    color: "#ffa600"
                  - from: 3.3
                    color: "#43a047"
                  - from: 4.15
                    color: "#ffa600"
                  - from: 4.2
                    color: "#db4437"
              - type: gauge
                entity: sensor.ck0_bms_current
                name: Current
                min: -200
                max: 200
                needle: true
                severity:
                  green: 0
                  red: -200
              - type: gauge
                entity: sensor.ck0_bms_power
                name: Power
                min: -100
                max: 100
                needle: true
                severity:
                  green: 0
                  red: -100

          - type: entities
            title: System Status
            entities:
              - entity: sensor.ck0_bms_system_state_text
                name: System State
              - entity: sensor.ck0_bms_contactor_state_text
                name: Contactor State
              - entity: sensor.ck0_bms_last_event_text
                name: Last Event
              - entity: button.ck0_bms_run
                name: Run BMS
                icon: mdi:play
              - entity: button.ck0_bms_stop
                name: Stop BMS
                icon: mdi:stop
              - entity: button.ck0_bms_calibrate
                name: Calibrate BMS
                icon: mdi:wrench

  - title: Battery Details
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: Voltage & Capacity
            entities:
              - entity: sensor.ck0_bms_output_voltage
                name: Output Voltage
              - entity: sensor.ck0_bms_contactor_voltage_positive
                name: Positive Contactor
              - entity: sensor.ck0_bms_contactor_voltage_negative
                name: Negative Contactor
              - entity: sensor.ck0_bms_capacity
                name: Capacity
              - entity: sensor.ck0_bms_charge_raw
                name: Charge Raw
              - entity: sensor.ck0_bms_soc_voltage_based
                name: SOC (Voltage Based)
              - entity: sensor.ck0_bms_soc_basic_count
                name: SOC (Basic Count)

          - type: entities
            title: Energy Stats
            entities:
              - entity: sensor.ck0_bms_power_charging
                name: Power Charging
              - entity: sensor.ck0_bms_power_discharging
                name: Power Discharging
              - entity: sensor.ck0_bms_energy_charged_daily
                name: Energy Charged (Daily)
              - entity: sensor.ck0_bms_energy_discharged_daily
                name: Energy Discharged (Daily)
              - entity: sensor.ck0_bms_net_energy_daily
                name: Net Energy (Daily)

  - title: Cells
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            title: Cell Summary
            entities:
              - entity: sensor.ck0_bms_cell_min
                name: Min Cell Voltage
              - entity: sensor.ck0_bms_cell_max
                name: Max Cell Voltage
              - entity: sensor.ck0_bms_cell_delta
                name: Cell Delta
              - entity: sensor.ck0_bms_balancing_cells
                name: Balancing Cells

          - type: markdown
            content: >
              **Note:** Cells are automatically listed below.

          - type: custom:auto-entities
            card:
              type: entities
              title: Cell Voltages
              show_header_toggle: false
              state_color: true
            filter:
              template: |
                {% for state in states.sensor | selectattr('entity_id', 'search', 'ck0_cell_voltage_') | sort(attribute='entity_id') -%}
                  {{
                    {
                      'entity': state.entity_id,
                      'name': 'Cell ' + state.entity_id.split('_')[-1]
                    }
                  }},
                {%- endfor %}

  - title: Cell Bar Graph
    panel: true
    cards:
      - type: custom:plotly-graph
        title: Cell Voltages
        raw_plotly_config: true
        refresh_interval: 2
        fn: |-
          $ex {
            vars.x = [];
            vars.y = [];
            
            for (let j = 0; j < 108; j++) {
              let index = j + 1;
              let suffix = index.toString().padStart(3, '0');
              let entity_id = "sensor.ck0_cell_voltage_" + suffix;
              
              if (hass.states[entity_id]) {
                let val = parseFloat(hass.states[entity_id].state);
                // Only include valid values > 0 to avoid skewing the graph
                if (!isNaN(val) && val > 0.01) {
                  vars.x.push(index);
                  vars.y.push(val);
                }
              }
            }

            if (vars.y.length > 0) {
              vars.ymin = Math.min(...vars.y) - 0.01;
              vars.ymax = Math.max(...vars.y) + 0.01;
            } else {
              vars.ymin = 0;
              vars.ymax = 5;
            }
          }
        entities:
          - entity: ""
            type: bar
            x: $ex vars.x
            y: $ex vars.y
            texttemplate: "%{y:.3f}"
            marker:
              color: "#3498db"
        layout:
          height: 600
          xaxis:
            title: Cell Number
            type: category
          yaxis:
            title: Voltage (V)
            range:
              - $ex vars.ymin
              - $ex vars.ymax
        config:
          displayModeBar: false
          scrollZoom: false

  - title: Cell Line Graph
    panel: true
    cards:
      - type: custom:plotly-graph
        title: Cell Voltages Line
        raw_plotly_config: true
        refresh_interval: 2
        fn: |-
          $ex {
            vars.x = [];
            vars.y = [];
            
            for (let j = 0; j < 108; j++) {
              let index = j + 1;
              let suffix = index.toString().padStart(3, '0');
              let entity_id = "sensor.ck0_cell_voltage_" + suffix;
              
              if (hass.states[entity_id]) {
                let val = parseFloat(hass.states[entity_id].state);
                if (!isNaN(val) && val > 0.01) {
                  vars.x.push(index);
                  vars.y.push(val);
                }
              }
            }

            if (vars.y.length > 0) {
              vars.ymin = Math.min(...vars.y) - 0.01;
              vars.ymax = Math.max(...vars.y) + 0.01;
            } else {
              vars.ymin = 0;
              vars.ymax = 5;
            }
          }
        entities:
          - entity: ""
            type: scatter
            mode: lines+markers
            x: $ex vars.x
            y: $ex vars.y
            texttemplate: "%{y:.3f}"
            line:
              color: "#e74c3c"
              width: 2
            marker:
              size: 6
        layout:
          height: 600
          xaxis:
            title: Cell Number
            type: category
            showgrid: false
          yaxis:
            title: Voltage (V)
            range:
              - $ex vars.ymin
              - $ex vars.ymax
        config:
          displayModeBar: false
          scrollZoom: false

