  - title: Log
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: entities
            card_mod:
              style: |
                ha-card {
                  max-width: 400px;
                }
            entities:
              - entity: switch.ck0_bms_log_enable
                name: BMS Log Enable
              - entity: number.ck0_bms_log_update_rate
                name: Update Rate (s)
          - type: markdown
            card_mod:
              style: |
                ha-card {
                  background: #1a1a2e !important;
                  font-family: 'Courier New', Courier, monospace;
                }
                ha-markdown {
                  padding: 16px !important;
                }
            content: >
              ## BMS Log Lines

              ```

              {% for i in range(1, 51) %}{% set s =
              states('sensor.ck0_bms_log_%02d' | format(i)) %}{% if s not in
              ['unknown', 'unavailable'] %}{{ s }}

              {% endif %}{% endfor %}```
  - title: Event
    type: sections
    max_columns: 5
    sections:
      - cards:
          - type: heading
            heading: Status
            heading_style: title
          - type: custom:auto-entities
            card:
              type: grid
              title: Active Events
              columns: 2
              square: false
            card_param: cards
            filter:
              template: >
                {% for state in states.sensor | selectattr('entity_id',
                'search', 'ck0_(fatal|critical|warning|info)_') |
                sort(attribute='attributes.friendly_name') -%}
                  {% if state.state not in ['INACTIVE', 'unknown', 'unavailable'] and not state.state.startswith('INACTIVE') -%}
                    {% set color = '#2196F3' -%}{% set level = 'Info' -%}
                    {% if 'FATAL' in state.state %}{% set color = '#D50000' -%}{% set level = 'Fatal' -%}
                    {% elif 'CRITICAL' in state.state %}{% set color = '#F44336' -%}{% set level = 'Critical' -%}
                    {% elif 'WARNING' in state.state %}{% set color = '#FFC107' -%}{% set level = 'Warning' -%}
                    {% elif 'INFO' in state.state %}{% set color = '#2196F3' -%}{% set level = 'Info' -%}
                    {% elif 'fatal' in state.entity_id %}{% set color = '#D50000' -%}{% set level = 'Fatal' -%}
                    {% elif 'critical' in state.entity_id %}{% set color = '#F44336' -%}{% set level = 'Critical' -%}
                    {% elif 'warning' in state.entity_id %}{% set color = '#FFC107' -%}{% set level = 'Warning' -%}
                    {% elif 'info' in state.entity_id %}{% set color = '#2196F3' -%}{% set level = 'Info' -%}
                    {% endif -%}
                    {{
                      {
                        "type": "tile",
                        "entity": state.entity_id,
                        "name": (state.attributes.friendly_name | replace("CellKeeper0", "") | replace("ck0", "") | replace("Fatal:", "") | replace("Critical:", "") | replace("Warning:", "") | replace("Info:", "") | trim),
                        "color": color,
                        "card_mod": {
                          "style": "ha-card { --tile-color: " + color + " !important; }"
                        }
                      }
                    }},
                  {%- endif %}
                {%- endfor %}
            show_empty: false
            unique: true
          - type: custom:auto-entities
            card:
              type: grid
              title: Previously Active Events
              columns: 2
              square: false
            card_param: cards
            filter:
              template: >
                {% for state in states.sensor | selectattr('entity_id',
                'search', 'ck0_(fatal|critical|warning|info)_') |
                sort(attribute='attributes.friendly_name') -%}
                  {% if state.state.startswith('INACTIVE (') -%}
                    {% set level = 'Info' -%}
                    {% if 'fatal' in state.entity_id %}{% set level = 'Fatal' -%}
                    {% elif 'critical' in state.entity_id %}{% set level = 'Critical' -%}
                    {% elif 'warning' in state.entity_id %}{% set level = 'Warning' -%}
                    {% elif 'info' in state.entity_id %}{% set level = 'Info' -%}
                    {% endif -%}
                    {{
                      {
                        "type": "tile",
                        "entity": state.entity_id,
                        "name": (state.attributes.friendly_name | replace("CellKeeper0", "") | replace("ck0", "") | replace("Fatal:", "") | replace("Critical:", "") | replace("Warning:", "") | replace("Info:", "") | trim),
                        "color": "#9C27B0",
                        "card_mod": {
                          "style": "ha-card { --tile-color: #9C27B0 !important; }"
                        }
                      }
                    }},
                  {%- endif %}
                {%- endfor %}
            show_empty: false
            unique: true
        column_span: 5
      - type: grid
        cards:
          - type: heading
            heading: All Event Types
            heading_style: title
          - square: false
            type: grid
            columns: 2
            cards:
              - type: tile
                entity: sensor.ck0_info_boot_normal
                name: Boot Normal
                vertical: false
                features_position: bottom
                card_mod:
                  style: |
                    ha-card {
                      {% set state = states(config.entity) %}
                      {% if 'FATAL' in state %}
                        --tile-color: #D50000 !important;
                      {% elif 'CRITICAL' in state %}
                        --tile-color: #F44336 !important;
                      {% elif 'WARNING' in state %}
                        --tile-color: #FFC107 !important;
                      {% elif 'INFO' in state %}
                        --tile-color: #2196F3 !important;
                      {% elif state != 'INACTIVE (0)' and state != 'INACTIVE' %}
                        --tile-color: #9C27B0 !important;
                      {% endif %}
                    }
              - type: tile
                card_mod:
                  style: |
                    ha-card {
                      {% set state = states(config.entity) %}
                      {% if 'FATAL' in state %}
                        --tile-color: #D50000 !important;
                      {% elif 'CRITICAL' in state %}
                        --tile-color: #F44336 !important;
                      {% elif 'WARNING' in state %}
                        --tile-color: #FFC107 !important;
                      {% elif 'INFO' in state %}
                        --tile-color: #2196F3 !important;
                      {% elif state != 'INACTIVE (0)' and state != 'INACTIVE' %}
                        --tile-color: #9C27B0 !important;
                      {% endif %}
                    }
                entity: sensor.ck0_info_boot_watchdog
                name: Boot Watchdog
              - type: tile
                card_mod:
                  style: |
                    ha-card {
                      {% set state = states(config.entity) %}
                      {% if 'FATAL' in state %}
                        --tile-color: #D50000 !important;
                      {% elif 'CRITICAL' in state %}
                        --tile-color: #F44336 !important;
                      {% elif 'WARNING' in state %}
                        --tile-color: #FFC107 !important;
                      {% elif 'INFO' in state %}
                        --tile-color: #2196F3 !important;
                      {% elif state != 'INACTIVE (0)' and state != 'INACTIVE' %}
                        --tile-color: #9C27B0 !important;
                      {% endif %}
                    }
                entity: sensor.ck0_info_restarting
                name: Restarting
              - type: tile
                card_mod:
                  style: |
                    ha-card {
                      {% set state = states(config.entity) %}
