esphome:
  name: waveshare-esp32-p4-nano
  friendly_name: Waveshare ESP32-P4-Nano

esp32:
  board: esp32-p4-devkitc-1
  framework:
    type: esp-idf

# Modular Packages
packages:
  bms_logic: !include bms_core.yaml
  # Headless device - no ui_layout or bms_ui_scripts

psram:
  mode: octal
  speed: 80MHz

esp32_hosted:
  # C6 Coprocessor support for Wi-Fi/BT
  network_adapter:
    # Use standard C6 firmware pins
    tx_pin: GPIO27
    rx_pin: GPIO28
    cts_pin: GPIO29
    rts_pin: GPIO30

update:
  - platform: esp32_hosted
    name: "C6 Coprocessor Update"
    path: /path/to/network_adapter.bin
    sha256: your_sha256_hash_here

ethernet:
  type: IP101
  mdio_pin: GPIO24
  mdc_pin: GPIO25
  reset_pin: GPIO26
  # Use RMII pins... (Assuming typical Waveshare P4 Nano wiring)

web_server:
  port: 80

wifi:
  # Wi-Fi via C6 coprocessor
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:
  baud_rate: 115200
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG

uart:
  - id: uart_bus
    tx_pin: GPIO37
    rx_pin: GPIO38
    baud_rate: 460800

i2c:
  - id: bus_a
    sda: GPIO07
    scl: GPIO08
    scan: true

sensor:
  - platform: uptime
    id: uptime_sec
    update_interval: 5s
