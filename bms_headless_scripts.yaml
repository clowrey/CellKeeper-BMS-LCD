script:
  - id: update_soc_ui
    then:
      - logger.log: "SOC updated"

  - id: update_power_ui
    then:
      - logger.log: "Power updated"

  - id: update_temp_ui
    then:
      - logger.log: "Temperature updated"

  - id: update_cells_ui
    then:
      - logger.log: "Cells updated"

  - id: update_contactor_ui
    then:
      - lambda: |-
          int val = (int)id(bms_contactor_state).state;
          static int last_val = -1;
          const char* state_str = "UNKNOWN";
          switch(val) {
            case 0: state_str = "OPEN / OFF"; break;
            case 1: state_str = "PRECHARGE"; break;
            case 2: state_str = "CLOSED / ON"; break;
            case 3: state_str = "WELDED"; break;
            case 4: state_str = "FAULT"; break;
          }
          char buf[32];
          sprintf(buf, "%d %s", val, state_str);
          if (val != last_val) {
            id(bms_contactor_state_text).publish_state(buf);
            last_val = val;
          }

  - id: update_system_ui
    then:
      - lambda: |-
          int val = (int)id(bms_system_state).state;
          static int last_val = -1;
          const char* state_str = "UNKNOWN";
          switch(val) {
            case 0: state_str = "INIT"; break;
            case 1: state_str = "IDLE"; break;
            case 2: state_str = "PRECHARGE"; break;
            case 3: state_str = "RUN"; break;
            case 4: state_str = "STOP"; break;
            case 5: state_str = "FAULT"; break;
          }
          char buf[32];
          sprintf(buf, "%d %s", val, state_str);
          if (val != last_val) {
            id(bms_system_state_text).publish_state(buf);
            last_val = val;
          }

  - id: update_system_req_ui
    then:
      - lambda: |-
          int val = (int)id(bms_system_req).state;
          static int last_val = -1;
          const char* state_str = "NONE";
          switch(val) {
            case 1: state_str = "RUN"; break;
            case 2: state_str = "STOP"; break;
            case 3: state_str = "CALIBRATE"; break;
          }
          char buf[32];
          sprintf(buf, "%d %s", val, state_str);
          if (val != last_val) {
            id(bms_system_req_text).publish_state(buf);
            last_val = val;
          }

  - id: update_events_ui
    then:
      - lambda: |-
          auto* bms = (esphome::hmi_bms::HMIBMS*) id(bms_hub);
          int code = bms->get_last_event_code();
          int level = bms->get_last_event_level();
          const char* type_str = bms->get_last_event_type_str();
          
          if (code == 0) return;
          
          const char* level_pfx = "";
          switch(level) {
            case 1: level_pfx = "[INFO] "; break;
            case 2: level_pfx = "[WARN] "; break;
            case 3: level_pfx = "[ERR!] "; break;
            case 4: level_pfx = "[CRIT] "; break;
          }
          
          char buf[64];
          sprintf(buf, "%s%d %s", level_pfx, code, type_str);
          id(bms_last_event_text).publish_state(buf);

  - id: update_debug_page
    then:
      - logger.log: "Debug updated"
