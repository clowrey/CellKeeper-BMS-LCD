  - platform: template
    id: bms_system_state_text
    name: "BMS System State Text"
    lambda: |-
      static const char* states[] = {"UNINIT", "INIT", "CALIB", "INACTIVE", "OPERATING", "FAULT"};
      int val = (int)id(bms_system_state).state;
      if (val >= 0 && val <= 5) return {states[val]};
      return {"UNKNOWN"};
    update_interval: 500ms

  - platform: template
    id: bms_contactor_state_text
    name: "BMS Contactor State Text"
    lambda: |-
      static const char* states[] = {
        "OPEN", "TST_PRE_CL", "TST_NEG_OP", "TST_NEG_CL", "TST_POS_OP", "TST_POS_CL",
        "PRE_NEG", "PRECHARGING", "CLOSED", "CALIB", "CAL_CL_NEG", "CAL_PRE",
        "CAL_CLOSED", "PRE_FAIL", "TST_FAIL"
      };
      int val = (int)id(bms_contactor_state).state;
      if (val >= 0 && val <= 14) return {states[val]};
      return {"UNKNOWN"};
    update_interval: 500ms

  - platform: template
    id: bms_last_event_text
    name: "BMS Last Event Text"
    update_interval: 1s
    lambda: |-
      auto* bms = (esphome::hmi_bms::HMIBMS*) id(bms_hub);
      int code = bms->get_last_event_code();
      if (code == -1) return {"No Events"};
      int level = bms->get_last_event_level();
      const char* levels[] = {"", "[INFO]", "[WARN]", "[ERR!]", "[CRIT]"};
      char buf[64];
      sprintf(buf, "%s %d %s", levels[level % 5], code, bms->get_last_event_type_str());
      return {buf};

