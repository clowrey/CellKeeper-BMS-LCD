  # --- ENERGY SENSORS ---

  # 1. Total Power (kW) - calculated from V and A
  - platform: template
    name: "BMS Power"
    id: bms_power_kW
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      if (std::isnan(id(bms_voltage_mV).state) || std::isnan(id(bms_current_mA).state)) {
        return NAN;
      }
      // Voltage is V, Current is A -> Power is W. Divide by 1000 for kW.
      return (id(bms_voltage_mV).state * id(bms_current_mA).state) / 1000.0f;
    update_interval: 100ms

  # 2. Split Power into Charging (Positive) and Discharging (Negative -> Positive)
  # Source is now kW, so no extra division needed.
  - platform: template
    name: "BMS Power Charging"
    id: bms_power_charging
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      if (std::isnan(id(bms_power_kW).state)) return NAN;
      return std::max(0.0f, id(bms_power_kW).state);
    update_interval: 100ms

  - platform: template
    name: "BMS Power Discharging"
    id: bms_power_discharging
    unit_of_measurement: "kW"
    device_class: power
    state_class: measurement
    accuracy_decimals: 3
    lambda: |-
      if (std::isnan(id(bms_power_kW).state)) return NAN;
      // Convert negative power (discharging) to positive value for integration
      return std::abs(std::min(0.0f, id(bms_power_kW).state));
    update_interval: 100ms

  # 3. Daily Energy Sensors (kWh)
  - platform: total_daily_energy
    name: "BMS Energy Charged Daily"
    id: bms_energy_charged_daily
    power_id: bms_power_charging
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    method: left
    time_id: homeassistant_time

  - platform: total_daily_energy
    name: "BMS Energy Discharged Daily"
    id: bms_energy_discharged_daily
    power_id: bms_power_discharging
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total_increasing
    accuracy_decimals: 3
    method: left
    time_id: homeassistant_time

  # 4. Net Daily Energy (Charged - Discharged)
  - platform: template
    name: "BMS Net Energy Daily"
    id: bms_energy_net_daily
    unit_of_measurement: "kWh"
    device_class: energy
    state_class: total
    accuracy_decimals: 3
    lambda: |-
      if (std::isnan(id(bms_energy_charged_daily).state) || std::isnan(id(bms_energy_discharged_daily).state)) {
        return NAN;
      }
      return id(bms_energy_charged_daily).state - id(bms_energy_discharged_daily).state;
    update_interval: 1s

